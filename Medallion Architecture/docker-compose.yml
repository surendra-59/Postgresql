version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: banking_medallion_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - banking_pg_data:/var/lib/postgresql/data

volumes:
  banking_pg_data:
